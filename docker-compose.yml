services:
  app:
    build: .
    container_name: monitor-reports-app
    expose:
      - "3000" # Porta interna do container (fechada para o mundo externo)
    env_file:
      - .env.local
    restart: always

  nginx:
    image: nginx:alpine
    container_name: monitor-reports-nginx
    ports:
      - "3001:80" # O Nginx do container escuta na 80, mas o mundo acessa pela 3001 da VM
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro # Injeta a configuração
    depends_on:
      - app
    restart: always